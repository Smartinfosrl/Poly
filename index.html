const CORS_PROXIES=["https://corsproxy.io/?url=","https://api.allorigins.win/raw?url="];
let useProxy=false;
let proxyIdx=0;

// Smart fetch: try direct first, fallback to CORS proxy (needed for Firefox)
const smartFetch=async(url,opts={})=>{
  if(!useProxy){
    try{
      const r=await fetch(url,opts);
      if(r.ok)return r;
      throw new Error(`HTTP ${r.status}`);
    }catch(e){
      if(e.name==="AbortError")throw e;
      console.log("Direct fetch failed, switching to CORS proxy");
      useProxy=true;
    }
  }
  // Try proxies
  for(let i=0;i<CORS_PROXIES.length;i++){
    const pi=(proxyIdx+i)%CORS_PROXIES.length;
    try{
      const proxyUrl=CORS_PROXIES[pi]+encodeURIComponent(url);
      const r=await fetch(proxyUrl,{signal:opts.signal});
      if(r.ok){proxyIdx=pi;return r}
    }catch(e){if(e.name==="AbortError")throw e}
  }
  throw new Error("Tutte le connessioni fallite. Prova con Chrome.");
};
const LS_KEY="pm_scanner_settings";

const playSound=sev=>{try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=sev==="critical"?"sawtooth":"sine";o.frequency.value=sev==="critical"?880:660;g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+(sev==="critical"?.8:.4));o.start(c.currentTime);o.stop(c.currentTime+1);if(sev==="critical")setTimeout(()=>{const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.type="sawtooth";o2.frequency.value=1100;g2.gain.setValueAtTime(.3,c.currentTime);g2.gain.exponentialRampToValueAtTime(.001,c.currentTime+.6);o2.start(c.currentTime);o2.stop(c.currentTime+.7)},300)}catch(e){}};

const buildEmailTxt=(sigs)=>{let t=`🔍 PM INSIDER SIGNAL DETECTOR\n${new Date().toLocaleString("it-IT")}\n${sigs.length} segnali (${sigs.filter(s=>s.maxSeverity==="critical").length} critici)\n${"─".repeat(36)}\n\n`;for(const s of sigs.slice(0,10)){t+=`${s.maxSeverity==="critical"?"🔴":s.maxSeverity==="alert"?"🟠":"🔵"} ${s.market.question}\nScore:${s.totalWeight} | Vol24h:${fmt(s.meta.vol24h)} | YES:${pct(s.meta.yesPrice)}\n`;for(const d of s.detections)t+=`  ${d.icon} ${d.label}: ${d.detail}\n`;t+=`  → https://polymarket.com/event/${s.market.slug}\n\n`}return t};
const sendEJS=async(sid,tid,pk,to,sigs)=>{try{await loadEJS();const sum=`${sigs.length} segnali (${sigs.filter(s=>s.maxSeverity==="critical").length} critici)`;const r=await window.emailjs.send(sid,tid,{to_email:to,subject:`🔍 PM Alert: ${sum}`,message:buildEmailTxt(sigs),timestamp:new Date().toLocaleString("it-IT")},pk);return r.status===200}catch(e){console.error("EJS:",e);return false}};

// ─── Signal Engine ─────────────────────────────────
function analyze(markets,ph,cfg){
  const sigs=[];
  const v24s=markets.map(m=>parseFloat(m.volume24hr)||0).filter(v=>v>0);
  const medV=v24s.sort((a,b)=>a-b)[Math.floor(v24s.length/2)]||1000;
  const tc={};
  for(const m of markets)for(const t of m.tags||[]){const l=t.label||t.slug||t;tc[l]=(tc[l]||0)+1}
  for(const m of markets){
    const vol=parseFloat(m.volume)||0,v24=parseFloat(m.volume24hr)||0,liq=parseFloat(m.liquidity)||0;
    const prices=JSON.parse(m.outcomePrices||"[]").map(Number),yP=prices[0]||0;
    const cr=new Date(m.createdAt),aH=(Date.now()-cr)/36e5;
    const tags=(m.tags||[]).map(t=>t.label||t.slug||""),sp=m._spread||0,bi=m._bookImbalance||0,prH=ph[m.id]||null;
    const det=[];
    // NEW TYPE
    const rare=tags.some(t=>(tc[t]||0)<=cfg.rareCategoryMax);
    if(rare&&aH<cfg.newTypeMaxAge)det.push({signal:"NEW_TYPE",icon:"🆕",label:"Nuova tipologia",severity:v24>cfg.newTypeMinVol?"critical":"watch",weight:v24>cfg.newTypeMinVol?4:2,detail:`Cat. rara — creato ${ago(aH)} fa`,insight:"Mercati nicchia = veicolo insider"});
    // VOLUME SURGE
    const vR=vol>0?v24/vol:0,vM=v24/Math.max(medV,1);
    if(v24>cfg.surgeMinVol&&(vR>cfg.surgeRatio||vM>cfg.surgeVsMedian)){const big=vR>cfg.surgeRatio*2||vM>cfg.surgeVsMedian*3;det.push({signal:"VOLUME_SURGE",icon:"📊",label:"Picco volume",severity:big?"critical":"alert",weight:big?5:3,detail:`24h ${fmt(v24)}=${(vR*100).toFixed(0)}% tot, ${vM.toFixed(1)}x med`,insight:"Picchi precedono eventi non pubblici"})}
    // PRICE DISLOCATION
    if(prH&&prH.length>=3){const r=prH.slice(-6),sw=Math.abs((r[r.length-1]?.p||yP)-(r[0]?.p||yP));if(sw>cfg.priceSwingMin)det.push({signal:"PRICE_DISLOCATION",icon:"⚡",label:"Prezzo dislocato",severity:sw>cfg.priceSwingMin*2?"critical":"alert",weight:sw>cfg.priceSwingMin*2?5:3,detail:`Swing ${pct(sw)}`,insight:"Movimenti senza news = info privilegiate"})}
    // VOL/LIQ
    if(v24>cfg.surgeMinVol&&liq>0&&v24/liq>cfg.volLiqImbalance)det.push({signal:"LIQ_IMBALANCE",icon:"💧",label:"Squil. Vol/Liq",severity:v24/liq>cfg.volLiqImbalance*2?"critical":"alert",weight:v24/liq>cfg.volLiqImbalance*2?4:2,detail:`${fmt(v24)} su ${fmt(liq)} liq`,insight:"Urgenza posizionamento"});
    // BOOK SKEW
    if(Math.abs(bi)>cfg.bookSkewThreshold){const dir=bi>0?"BID":"ASK";det.push({signal:"BOOK_SKEW",icon:"📐",label:"Book sbilanciato",severity:Math.abs(bi)>cfg.bookSkewThreshold*1.5?"alert":"watch",weight:Math.abs(bi)>cfg.bookSkewThreshold*1.5?3:1,detail:`${pct(Math.abs(bi))} → ${dir}`,insight:"Convinzione direzionale informata"})}
    // NICHE HEAT
    if(vol<cfg.nicheMaxTotalVol&&v24>cfg.nicheMinDailyVol&&v24/Math.max(vol,1)>cfg.nicheHeatRatio)det.push({signal:"NICHE_HEAT",icon:"🔍",label:"Nicchia attiva",severity:"alert",weight:3,detail:`${fmt(vol)} tot ma ${fmt(v24)} oggi`,insight:"Mercati oscuri = veicolo insider"});
    // GEO
    const eD=m.endDate?new Date(m.endDate):null,hE=eD?(eD-Date.now())/36e5:Infinity;
    const isG=tags.some(t=>GEO_RE.test(t));
    if(isG&&hE<cfg.geoExpiryHours&&v24>cfg.surgeMinVol)det.push({signal:"GEO_SENSITIVE",icon:"🌐",label:"Geo sensibile",severity:"critical",weight:4,detail:`Scad. ${ago(hE)}, vol ${fmt(v24)}`,insight:"Epicentro scandali insider"});
    // INFORMED FLOW
    if(sp>cfg.spreadWide&&v24>cfg.surgeMinVol)det.push({signal:"INFORMED_FLOW",icon:"🎯",label:"Flusso informato",severity:"alert",weight:3,detail:`Spread ${pct(sp)}, vol ${fmt(v24)}`,insight:"MM allarga spread per adverse selection"});
    if(det.length>0){const tw=det.reduce((s,d)=>s+d.weight,0);const ms=det.some(d=>d.severity==="critical")?"critical":det.some(d=>d.severity==="alert")?"alert":"watch";sigs.push({market:m,detections:det,totalWeight:tw,maxSeverity:ms,meta:{vol,vol24h:v24,liq,yesPrice:yP,ageH:aH,spread:sp,bookImbalance:bi,tags,hoursToExpiry:hE,priceHistory:prH}})}
  }
  return sigs.sort((a,b)=>b.totalWeight-a.totalWeight);
}

const SEV={critical:{color:"#ff2d55",bg:"#ff2d5512",bdr:"#ff2d5540",l:"CRITICO"},alert:{color:"#ff9f0a",bg:"#ff9f0a12",bdr:"#ff9f0a40",l:"ALLERTA"},watch:{color:"#64d2ff",bg:"#64d2ff12",bdr:"#64d2ff40",l:"MONITOR"}};

// ─── Spark ─────────────────────────────────────────
function Spark({data,w=90,h=24}){if(!data||data.length<2)return null;const vs=data.map(d=>d.p),mn=Math.min(...vs),mx=Math.max(...vs),rg=mx-mn||1;const pts=vs.map((v,i)=>`${(i/(vs.length-1))*w},${h-((v-mn)/rg)*h}`).join(" ");const up=vs[vs.length-1]>vs[0];return React.createElement("svg",{width:w,height:h,style:{display:"block"}},React.createElement("polyline",{points:pts,fill:"none",stroke:up?"#34c759":"#ff2d55",strokeWidth:"1.5",strokeLinejoin:"round"}),React.createElement("circle",{cx:w,cy:h-((vs[vs.length-1]-mn)/rg)*h,r:"2",fill:up?"#34c759":"#ff2d55"}))}

// ─── Signal Card ───────────────────────────────────
function Card({signal:s,rank:r}){
  const[open,setOpen]=useState(false);
  const m=s.market,sv=SEV[s.maxSeverity],oc=JSON.parse(m.outcomes||"[]"),pr=JSON.parse(m.outcomePrices||"[]").map(Number);
  const cols=["#34c759","#ff2d55","#007aff","#ff9f0a","#bf5af2"];
  return(
    <div className="card" onClick={()=>setOpen(!open)} style={{background:"var(--card)",border:`1px solid ${open?sv.color+"60":"var(--brd)"}`,borderLeft:`3px solid ${sv.color}`,borderRadius:8,padding:"14px 16px",marginBottom:8,cursor:"pointer"}}>
      <div style={{display:"flex",gap:10,alignItems:"flex-start"}}>
        <div style={{textAlign:"center",minWidth:36,flexShrink:0}}>
          <div style={{fontSize:17,fontWeight:800,fontFamily:"var(--m)",color:sv.color}}>{r}</div>
          <div style={{fontSize:7,fontWeight:700,letterSpacing:".7px",padding:"2px 4px",borderRadius:3,background:sv.bg,color:sv.color,border:`1px solid ${sv.bdr}`,marginTop:2}}>{sv.l}</div>
        </div>
        <div style={{flex:1,minWidth:0}}>
          <h3 style={{margin:0,fontSize:13,fontWeight:600,lineHeight:1.4}}>{m.question}</h3>
          <div style={{display:"flex",flexWrap:"wrap",gap:3,marginTop:5}}>
            {s.detections.map((d,i)=><span key={i} style={{display:"inline-flex",alignItems:"center",gap:3,padding:"2px 6px",borderRadius:4,fontSize:9,fontWeight:600,background:SEV[d.severity].bg,color:SEV[d.severity].color,border:`1px solid ${SEV[d.severity].bdr}`}}>{d.icon} {d.label}</span>)}
          </div>
        </div>
        <div style={{textAlign:"right",flexShrink:0}}>
          <div style={{fontSize:18,fontWeight:800,fontFamily:"var(--m)"}}>{pct(s.meta.yesPrice)}</div>
          <div style={{fontSize:8,color:"var(--dim)",marginBottom:2}}>YES</div>
          <Spark data={s.meta.priceHistory}/>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:4,marginTop:8,paddingLeft:46}}>
        {[["Vol24h",fmt(s.meta.vol24h)],["Tot",fmt(s.meta.vol)],["Liq",fmt(s.meta.liq)],["Spread",s.meta.spread?pct(s.meta.spread):"—"],["Età",ago(s.meta.ageH)]].map(([k,v])=><div key={k}><div style={{fontSize:7,color:"var(--dim)",textTransform:"uppercase",letterSpacing:".6px",fontWeight:600}}>{k}</div><div style={{fontSize:11,fontWeight:700,fontFamily:"var(--m)",color:"var(--txt2)"}}>{v}</div></div>)}
      </div>
      {open&&<div style={{marginTop:10,paddingTop:10,borderTop:"1px solid var(--brd)",paddingLeft:46}}>
        {oc.length>0&&<div style={{marginBottom:10}}><div style={{fontSize:7,color:"var(--dim)",textTransform:"uppercase",letterSpacing:".6px",fontWeight:600,marginBottom:4}}>Probabilità</div><div style={{display:"flex",borderRadius:4,overflow:"hidden",height:18}}>{oc.map((o,i)=>{const p=pr[i]||0;return <div key={i} style={{width:`${Math.max(p*100,4)}%`,background:cols[i%5]+"25",display:"flex",alignItems:"center",justifyContent:"center",fontSize:7,fontWeight:700,color:cols[i%5],fontFamily:"var(--m)",borderRight:i<oc.length-1?"1px solid var(--bg)":"none"}}>{p>.06&&`${o} ${pct(p)}`}</div>})}</div></div>}
        {s.detections.map((d,i)=><div key={i} style={{padding:"7px 10px",marginBottom:5,borderRadius:5,background:SEV[d.severity].bg,borderLeft:`2px solid ${SEV[d.severity].color}`}}><div style={{fontSize:10,fontWeight:700,color:SEV[d.severity].color,marginBottom:2}}>{d.icon} {d.label}</div><div style={{fontSize:10,color:"var(--txt2)",lineHeight:1.5}}>{d.detail}</div><div style={{fontSize:9,color:"var(--dim3)",fontStyle:"italic",marginTop:3}}>💡 {d.insight}</div></div>)}
        {s.meta.tags.length>0&&<div style={{display:"flex",gap:3,flexWrap:"wrap",marginTop:5}}>{s.meta.tags.map((t,i)=><span key={i} style={{padding:"2px 5px",borderRadius:3,fontSize:8,background:"#1a1a28",color:"var(--dim3)",border:"1px solid var(--brd2)"}}>{t}</span>)}</div>}
        <a href={`https://polymarket.com/event/${m.slug}`} target="_blank" rel="noopener noreferrer" onClick={e=>e.stopPropagation()} style={{display:"inline-block",marginTop:8,fontSize:10,color:sv.color,textDecoration:"none",fontWeight:700}}>Apri su Polymarket →</a>
      </div>}
    </div>
  );
}

const CFG_M={rareCategoryMax:{l:"Cat. rara max",mn:1,mx:10,s:1},newTypeMaxAge:{l:"Età nuova tipo (h)",mn:12,mx:336,s:12},surgeMinVol:{l:"Vol min surge $",mn:500,mx:50000,s:500},surgeRatio:{l:"Ratio surge",mn:.05,mx:.8,s:.05},priceSwingMin:{l:"Swing min",mn:.03,mx:.5,s:.01},volLiqImbalance:{l:"Vol/Liq ratio",mn:1,mx:20,s:.5},bookSkewThreshold:{l:"Book skew",mn:.3,mx:.95,s:.05},geoExpiryHours:{l:"Geo finestra (h)",mn:12,mx:336,s:12},spreadWide:{l:"Spread soglia",mn:.02,mx:.2,s:.01}};

  // ── Install PWA state ──

  const isIOS=IS_IOS;
  const isAndroid=IS_ANDROID;

  // Listen for install prompt (Android/Chrome)
  useEffect(()=>{
    const handler=(e)=>{e.preventDefault();setInstallPrompt(e);if(!isStandalone&&!localStorage.getItem('pm_install_dismissed'))setShowInstall(true)};

    return()=>window.removeEventListener('beforeinstallprompt',handler);
  },[]);

  const doInstall=async()=>{if(installPrompt){installPrompt.prompt();const r=await installPrompt.userChoice;if(r.outcome==='accepted')setShowInstall(false);setInstallPrompt(null)}};
  const dismissInstall=()=>{setShowInstall(false);localStorage.setItem('pm_install_dismissed','1')};

  // Persist settings on change
  useEffect(()=>{saveSettings({cfg,schMin,ch,ejsPK,ejsSI,ejsTI,emTo,tgTok,tgCid,minSev})},[cfg,schMin,ch,ejsPK,ejsSI,ejsTI,emTo,tgTok,tgCid,minSev]);

  useEffect(()=>{if("Notification" in window)setNotifSt(Notification.permission);else setNotifSt("unsupported")},[]);

  // Countdown
  useEffect(()=>{if(!schOn||!nextScan){setCd("");return}const iv=setInterval(()=>{const d=nextScan-Date.now();if(d<=0){setCd("Scanning...");return}const m=Math.floor(d/6e4),s=Math.floor((d%6e4)/1e3);setCd(`${m}:${s.toString().padStart(2,"0")}`)},1000);return()=>clearInterval(iv)},[schOn,nextScan]);

  // Alerts
  const fire=useCallback(async(dets)=>{
    const so={critical:0,alert:1,watch:2},mi=so[minSev]??1;
    const ta=dets.filter(s=>so[s.maxSeverity]<=mi);if(!ta.length)return;
    const sum=`${ta.length} segnali (${ta.filter(s=>s.maxSeverity==="critical").length} crit)`,top=ta[0];
    if(ch.sound)playSound(top.maxSeverity);
    if(ch.browser&&Notification.permission==="granted")sendNotif(`🔍 PM: ${sum}`,`Top: ${top.market.question}`,top.maxSeverity);
    if(ch.telegram&&tgTok&&tgCid){let msg=`<b>🔍 PM Insider Alert</b>\n${new Date().toLocaleString("it-IT")}\n\n<b>${sum}</b>\n\n`;for(const s of ta.slice(0,5)){msg+=`${s.maxSeverity==="critical"?"🔴":"🟠"} <b>${s.market.question}</b>\nScore:${s.totalWeight} | ${fmt(s.meta.vol24h)} | ${pct(s.meta.yesPrice)}\n${s.detections.map(d=>`  ${d.icon} ${d.label}`).join("\n")}\n\n`}const ok=await sendTG(tgTok,tgCid,msg);setALog(p=>[...p,{t:new Date(),ch:"telegram",ok,n:ta.length}].slice(-50))}
    if(ch.email&&emTo&&ejsPK&&ejsSI&&ejsTI){const ok=await sendEJS(ejsSI,ejsTI,ejsPK,emTo,ta);setALog(p=>[...p,{t:new Date(),ch:"email",ok,n:ta.length}].slice(-50))}
    setALog(p=>[...p,{t:new Date(),ch:"summary",n:ta.length,c:ta.filter(s=>s.maxSeverity==="critical").length}].slice(-50));
  },[ch,minSev,emTo,ejsPK,ejsSI,ejsTI,tgTok,tgCid]);

  // Scan
  const scan=useCallback(async(auto=false)=>{
    if(loading)return;setLoading(true);setError(null);if(!auto)setSignals([]);
    abRef.current=new AbortController();const sg=abRef.current.signal;
    try{
      let all=[];const pgs=8;
      for(let i=0;i<pgs;i++){setProgress({t:`Mercati (${i+1}/${pgs})...`,p:((i+1)/pgs)*30});const r=await smartFetch(`${GAMMA}/markets?closed=false&active=true&limit=100&offset=${i*100}&order=volume24hr&ascending=false`,{signal:sg});if(!r.ok)throw new Error(`API ${r.status}`);const d=await r.json();if(!d.length)break;all=all.concat(d);await sleep(250)}
      setProgress({t:"Orderbook...",p:35});
      const top=all.filter(m=>(parseFloat(m.volume24hr)||0)>0).sort((a,b)=>(parseFloat(b.volume24hr)||0)-(parseFloat(a.volume24hr)||0)).slice(0,100);
      for(let i=0;i<top.length;i+=5){const batch=top.slice(i,i+5);await Promise.all(batch.map(async m=>{try{const tks=JSON.parse(m.clobTokenIds||"[]");if(!tks[0])return;const bR=await smartFetch(`${CLOB}/book?token_id=${tks[0]}`,{signal:sg});if(!bR.ok)return;const bk=await bR.json();const bV=(bk.bids||[]).reduce((s,b)=>s+parseFloat(b.size||0),0),aV=(bk.asks||[]).reduce((s,a)=>s+parseFloat(a.size||0),0),tt=bV+aV;m._bookImbalance=tt>0?(bV-aV)/tt:0;const bb=bk.bids?.[0]?.price?parseFloat(bk.bids[0].price):0,ba=bk.asks?.[0]?.price?parseFloat(bk.asks[0].price):1;m._spread=ba-bb}catch(e){}}));setProgress({t:`OB (${Math.min(i+5,top.length)}/${top.length})`,p:35+(Math.min(i+5,top.length)/top.length)*35});await sleep(180)}
      setProgress({t:"Prezzi...",p:72});const prH={};const cands=top.slice(0,50);
      for(let i=0;i<cands.length;i+=5){const batch=cands.slice(i,i+5);await Promise.all(batch.map(async m=>{try{const tks=JSON.parse(m.clobTokenIds||"[]");if(!tks[0])return;const r=await smartFetch(`${CLOB}/prices-history?market=${tks[0]}&interval=1d&fidelity=60`,{signal:sg});if(!r.ok)return;const d=await r.json();if(d.history?.length)prH[m.id]=d.history.map(h=>({t:h.t,p:parseFloat(h.p)}))}catch(e){}}));setProgress({t:`Prezzi (${Math.min(i+5,cands.length)}/${cands.length})`,p:72+(Math.min(i+5,cands.length)/cands.length)*20});await sleep(180)}
      setProgress({t:"Analisi...",p:95});await sleep(50);
      const det=analyze(all,prH,cfg);setSignals(det);
      const st={scanned:all.length,signals:det.length,critical:det.filter(s=>s.maxSeverity==="critical").length,alert:det.filter(s=>s.maxSeverity==="alert").length,watch:det.filter(s=>s.maxSeverity==="watch").length};
      setStats(st);const now=new Date();setLastScan(now);setHist(p=>[...p,{t:now,...st,auto}].slice(-100));setProgress({t:"",p:100});
      if(det.length>0)await fire(det);

  // Scheduler
  useEffect(()=>{if(schRef.current)clearInterval(schRef.current);if(!schOn){setNextScan(null);return}const ms=schMin*6e4;setNextScan(new Date(Date.now()+ms));schRef.current=setInterval(()=>{setNextScan(new Date(Date.now()+ms));scan(true)},ms);return()=>{if(schRef.current)clearInterval(schRef.current)}},[schOn,schMin]);

                <div style={{display:"flex",gap:8,marginBottom:8,alignItems:"flex-start"}}><span style={{color:"var(--blu)",fontWeight:700,fontSize:12,flexShrink:0}}>3.</span><span>Scorri e tocca <strong style={{color:"var(--txt)"}}>"Aggiungi a schermata Home"</strong> <span style={{fontSize:14}}>➕</span></span></div>
                <div style={{display:"flex",gap:8,alignItems:"flex-start"}}><span style={{color:"var(--blu)",fontWeight:700,fontSize:12,flexShrink:0}}>4.</span><span>Tocca <strong style={{color:"var(--txt)"}}>"Aggiungi"</strong> in alto a destra</span></div>

                <div style={{display:"flex",gap:8,marginBottom:6,alignItems:"flex-start"}}><span style={{color:"var(--org)",fontWeight:700,fontSize:12,flexShrink:0}}>1.</span><span>Clicca l'icona <strong style={{color:"var(--txt)"}}>installa</strong> 📥 nella barra degli indirizzi (a destra)</span></div>
                <div style={{display:"flex",gap:8,marginBottom:6,alignItems:"flex-start"}}><span style={{color:"var(--org)",fontWeight:700,fontSize:12,flexShrink:0}}>2.</span><span>Oppure menu <strong style={{color:"var(--txt)"}}>⋮ → "Installa PM Scanner"</strong></span></div>
                <div style={{display:"flex",gap:8,alignItems:"flex-start"}}><span style={{color:"var(--org)",fontWeight:700,fontSize:12,flexShrink:0}}>3.</span><span>Conferma l'installazione</span></div>
              </div>
            </div>}

            {/* Benefits */}
            <div style={{padding:10,borderRadius:6,background:"#bf5af208",border:"1px solid #bf5af220"}}>
              <div style={{fontSize:9,color:"#bf5af2",fontWeight:700,textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Vantaggi app installata</div>
              <div style={{fontSize:10,color:"var(--txt2)",lineHeight:1.7}}>
                ✦ Icona nella home come app nativa<br/>
                ✦ Apertura fullscreen senza barra browser<br/>

                ✦ Avvio rapido con un tap

          </>}

        {/* SCHEDULE PANEL */}
        {panel==="schedule"&&<div style={PS}>

                <button onClick={async()=>{const ok=await sendTG(tgTok,tgCid,"🔍 <b>Test</b> — PM Scanner connesso!");alert(ok?"✅ Inviato!":"❌ Verifica token/chat ID")}} style={{padding:"4px 8px",borderRadius:3,border:"1px solid var(--brd2)",background:"transparent",color:"var(--dim3)",fontSize:8,alignSelf:"flex-start"}}>▶ Test TG</button>

            </div>
          </div>
          {aLog.length>0&&<div style={{marginTop:8}}><div style={{fontSize:8,color:"var(--dim)",fontWeight:600,textTransform:"uppercase",marginBottom:3}}>Log</div><div style={{maxHeight:80,overflowY:"auto",borderRadius:4,border:"1px solid var(--brd)"}}>{[...aLog].reverse().slice(0,8).map((a,i)=><div key={i} style={{padding:"3px 8px",borderBottom:"1px solid #14141e",fontSize:9,color:"var(--dim3)",display:"flex",justifyContent:"space-between",fontFamily:"var(--m)"}}><span>{ts(a.t)}</span><span>{a.ch==="summary"?`${a.n} sig (${a.c} crit)`:`${a.ch} ${a.ok?"✅":"❌"}`}</span></div>)}</div></div>}
        </div>}

        {/* CONFIG */}
        {panel==="config"&&<div style={PS}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>⚙ Parametri</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {Object.entries(CFG_M).map(([k,m])=><div key={k}><div style={{fontSize:7,color:"var(--dim)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",display:"flex",justifyContent:"space-between"}}><span>{m.l}</span><span style={{color:"var(--blu)",fontFamily:"var(--m)"}}>{cfg[k]}</span></div><input type="range" min={m.mn} max={m.mx} step={m.s} value={cfg[k]} onChange={e=>setCfg(c=>({...c,[k]:parseFloat(e.target.value)}))} style={{width:"100%"}}/></div>)}
          </div>
          <div style={{textAlign:"right",marginTop:8}}><button onClick={()=>setCfg(DEF_CFG)} style={{padding:"3px 10px",borderRadius:3,border:"1px solid var(--brd)",background:"transparent",color:"var(--dim)",fontSize:9}}>Reset</button></div>
        </div>}

        {/* HISTORY */}
        {panel==="history"&&<div style={PS}>
          <div style={{fontSize:12,fontWeight:700,marginBottom:10}}>📋 Storico</div>
          {hist.length===0?<div style={{fontSize:10,color:"var(--dim)",textAlign:"center",padding:16}}>Nessuna scansione</div>:
          <div style={{maxHeight:200,overflowY:"auto"}}>{[...hist].reverse().map((s,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"4px 0",borderBottom:"1px solid #14141e",fontSize:10,fontFamily:"var(--m)"}}><span style={{color:"var(--txt2)"}}>{ts(s.t)} {ds(s.t)}</span><span style={{padding:"1px 5px",borderRadius:3,fontSize:8,fontWeight:600,background:s.auto?"#34c75918":"#64d2ff18",color:s.auto?"var(--grn)":"var(--blu)"}}>{s.auto?"AUTO":"MAN"}</span><span style={{color:s.critical>0?"var(--red)":"var(--dim)"}}>{s.signals}sig {s.critical}crit</span></div>)}</div>}
        </div>}
      </header>

      {/* PROGRESS */}
      {loading&&<div style={{padding:"0 16px"}}><div style={{height:2,background:"#1a1a28",borderRadius:1,overflow:"hidden"}}><div style={{height:"100%",width:`${progress.p}%`,background:"linear-gradient(90deg,#ff2d55,#ff6b6b)",transition:"width .3s"}}/></div><div style={{fontSize:9,color:"#ff6b6b",fontFamily:"var(--m)",padding:"4px 0",display:"flex",alignItems:"center",gap:5}}><span style={{animation:"pulse2 1.5s ease infinite"}}>●</span>{progress.t}</div></div>}
      {error&&<div style={{margin:"6px 16px",padding:"6px 10px",borderRadius:4,background:"#ff2d5515",border:"1px solid #ff2d5540",fontSize:10,color:"#ff6b6b"}}>⚠ {error}</div>}

      {/* STATS */}
      {stats&&<div style={{padding:"8px 16px",borderBottom:"1px solid var(--brd)",display:"flex",gap:14,fontSize:9,overflowX:"auto"}}>
        {[["Scan",stats.scanned,"var(--dim3)"],["Sig",stats.signals,"var(--txt)"],["Crit",stats.critical,"var(--red)"],["Alert",stats.alert,"var(--org)"],["Mon",stats.watch,"var(--blu)"],["",ts(lastScan),"var(--dim)"]].map(([k,v,c],i)=><div key={i} style={{display:"flex",alignItems:"center",gap:4,whiteSpace:"nowrap"}}>{k&&<span style={{color:"var(--dim2)",textTransform:"uppercase",letterSpacing:".5px",fontSize:7,fontWeight:600}}>{k}</span>}<span style={{color:c,fontWeight:700,fontFamily:"var(--m)"}}>{v}</span></div>)}
      </div>}

      {/* FILTERS */}
      {signals.length>0&&<div style={{padding:"8px 16px",borderBottom:"1px solid var(--brd)",overflowX:"auto",display:"flex",gap:3}}>
        {[["all","Tutti",null],["critical","🔴",null],["alert","🟠",null],["watch","🔵",null]].map(([v,l])=><button key={v} onClick={()=>setFSev(v)} style={{padding:"3px 7px",borderRadius:4,fontSize:9,fontWeight:600,border:`1px solid ${fSev===v?"var(--blu)40":"var(--brd)"}`,background:fSev===v?"#64d2ff15":"transparent",color:fSev===v?"var(--blu)":"var(--dim2)",whiteSpace:"nowrap",flexShrink:0}}>{l}</button>)}
        <span style={{width:1,background:"var(--brd)",margin:"0 2px",flexShrink:0}}/>
        {[["all","All"],["NEW_TYPE","🆕"],["VOLUME_SURGE","📊"],["PRICE_DISLOCATION","⚡"],["LIQ_IMBALANCE","💧"],["NICHE_HEAT","🔍"],["GEO_SENSITIVE","🌐"],["INFORMED_FLOW","🎯"]].map(([v,l])=>sigC[v]||v==="all"?<button key={v} onClick={()=>setFSig(v)} style={{padding:"3px 6px",borderRadius:3,fontSize:9,fontWeight:500,border:"none",background:fSig===v?"var(--brd2)":"transparent",color:fSig===v?"var(--txt2)":"var(--dim2)",whiteSpace:"nowrap",flexShrink:0}}>{l}</button>:null)}
        <span style={{width:1,background:"var(--brd)",margin:"0 2px",flexShrink:0}}/>
        {[["weight","⬇"],["volume","💰"],["newest","🕐"]].map(([v,l])=><button key={v} onClick={()=>setSort(v)} style={{padding:"3px 6px",borderRadius:3,fontSize:9,border:"none",background:sort===v?"var(--brd2)":"transparent",color:sort===v?"var(--txt2)":"var(--dim2)",flexShrink:0}}>{l}</button>)}
      </div>}

      {/* RESULTS */}
      <div style={{padding:"12px 16px 40px"}}>
        {!lastScan&&!loading&&<div style={{textAlign:"center",padding:"60px 16px"}}>
          <div style={{fontSize:32,marginBottom:12,opacity:.15}}>◉</div>
          <div style={{fontSize:14,fontWeight:600,color:"var(--dim3)",marginBottom:6}}>Pronto</div>
          <div style={{fontSize:11,color:"var(--dim)",lineHeight:1.7,maxWidth:360,margin:"0 auto"}}>Avvia una scansione o configura lo scheduler per monitoraggio automatico.</div>
          <button onClick={()=>scan(false)} style={{marginTop:16,padding:"10px 24px",borderRadius:6,background:"linear-gradient(135deg,#ff2d55,#ff6b6b)",color:"#fff",fontSize:12,fontWeight:700}}>▶ Avvia Scansione</button>
        </div>}
        {disp.map((s,i)=><Card key={s.market.id||i} signal={s} rank={i+1}/>)}
        {lastScan&&disp.length===0&&<div style={{textAlign:"center",padding:24,color:"var(--dim)",fontSize:11}}>Nessun segnale con i filtri attuali.</div>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

<script>
// Register Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(r=>{
      console.log('SW registered',r.scope);
    }).catch(e=>console.log('SW failed',e));
  });
}

// PWA Install — floating banner for first-time visitors
let deferredPrompt;
const _isStandalone=window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone===true;
const _isIOS=(navigator.userAgent||"").indexOf("iPhone")>=0||(navigator.userAgent||"").indexOf("iPad")>=0||(navigator.userAgent||"").indexOf("iPod")>=0;

window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  if(!_isStandalone&&!localStorage.getItem('pm_install_dismissed')){
    setTimeout(showInstallBanner,4000);
  }
});

if(_isIOS&&!_isStandalone&&!localStorage.getItem('pm_install_dismissed')){
  setTimeout(()=>{
    const b=document.createElement('div');b.id='install-banner';
    b.innerHTML=`<div style="position:fixed;bottom:16px;left:16px;right:16px;padding:14px 16px;background:#1a1a28;border:1px solid #252535;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:1000;font-family:var(--s);animation:fadeIn .3s ease">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:13px;color:#e5e5ee;font-weight:700">📲 Installa PM Scanner</div>
        <button onclick="dismissInstall()" style="background:none;border:none;color:#505068;font-size:16px;cursor:pointer;padding:4px">✕</button>
      </div>
      <div style="font-size:11px;color:#b0b0c0;line-height:1.6">
        Tocca <strong style="color:#64d2ff">⬆ Condividi</strong> poi <strong style="color:#64d2ff">"Aggiungi a schermata Home"</strong>
      </div>
    </div>`;
    document.body.appendChild(b);
  },4000);
}

function showInstallBanner(){
  if(!deferredPrompt||document.getElementById('install-banner'))return;
  const b=document.createElement('div');b.id='install-banner';
  b.innerHTML=`<div style="position:fixed;bottom:16px;left:16px;right:16px;padding:14px 16px;background:#1a1a28;border:1px solid #252535;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:1000;font-family:var(--s);animation:fadeIn .3s ease">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;color:#e5e5ee;font-weight:700">📲 Installa PM Scanner</div>
        <div style="font-size:10px;color:#707088;margin-top:2px">App nativa con notifiche e accesso rapido</div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="dismissInstall()" style="padding:8px 12px;border-radius:6px;border:1px solid #252535;background:transparent;color:#707088;font-size:11px;cursor:pointer;font-family:var(--s)">Dopo</button>
        <button onclick="installPWA()" style="padding:8px 16px;border-radius:6px;border:none;background:linear-gradient(135deg,#bf5af2,#8b5cf6);color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--s)">Installa</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(b);
}

function installPWA(){
  const b=document.getElementById('install-banner');
  if(b)b.remove();
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null})}
}
function dismissInstall(){
  const b=document.getElementById('install-banner');
  if(b)b.remove();
  localStorage.setItem('pm_install_dismissed','1');
}
</script>
</body>
</html>
