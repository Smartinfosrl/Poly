// Detect Firefox — always needs proxy for Polymarket APIs
const IS_FIREFOX=navigator.userAgent.toLowerCase().includes("firefox");
let useProxy=IS_FIREFOX;
let lastFetchTime=0;

// Proxy: only codetabs works reliably on Firefox
const proxyUrl=u=>"https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(u);

const smartFetch=async(url,opts={})=>{
  // Rate limit for proxy: min 250ms between calls
  if(useProxy){const now=Date.now(),wait=250-(now-lastFetchTime);if(wait>0)await new Promise(r=>setTimeout(r,wait));lastFetchTime=Date.now()}

  // Direct fetch for non-Firefox
  if(!useProxy){
    try{
      const c=new AbortController();
      const t=setTimeout(()=>c.abort(),8000);
      if(opts.signal?.aborted)throw new DOMException("Aborted","AbortError");
      const r=await fetch(url,{signal:c.signal});
      clearTimeout(t);
      if(r.ok)return r;
    }catch(e){
      if(e.name==="AbortError"&&opts.signal?.aborted)throw e;
    }
    console.log("Direct failed, switching to proxy");
    useProxy=true;lastFetchTime=Date.now();
  }

  // Proxy fetch with retry
  for(let attempt=0;attempt<3;attempt++){
    try{
      if(opts.signal?.aborted)throw new DOMException("Aborted","AbortError");
      const purl=proxyUrl(url);
      const c=new AbortController();
      const t=setTimeout(()=>c.abort(),15000);
      const onAbort=()=>{c.abort();clearTimeout(t)};
      opts.signal?.addEventListener("abort",onAbort,{once:true});
      const r=await fetch(purl,{signal:c.signal});
      clearTimeout(t);
      opts.signal?.removeEventListener("abort",onAbort);
      if(r.ok)return r;
      if(r.status===429||r.status===503){
        console.log("Proxy rate limited, waiting "+(2*(attempt+1))+"s...");
        await new Promise(r=>setTimeout(r,2000*(attempt+1)));
        continue;
      }
      return null;
    }catch(e){
      if(e.name==="AbortError"&&opts.signal?.aborted)throw e;
      if(attempt<2){
        console.log("Proxy attempt "+(attempt+1)+" failed, retrying...");
        await new Promise(r=>setTimeout(r,1500*(attempt+1)));
      }
    }
  }
  return null;
};
const LS_KEY="pm_scanner_settings";

// Read from Gist (public read = no token needed, private = needs token)
async function readGist(gistId,token){
  if(!gistId)return null;
  try{
    const headers={"Accept":"application/vnd.github+json"};
    if(token)headers["Authorization"]=`Bearer ${token}`;
    const r=await fetch(`https://api.github.com/gists/${gistId}`,{headers});
    if(!r.ok)return null;
    const d=await r.json();
    const content=d.files?.["archive.json"]?.content;
    return content?JSON.parse(content):[];
  }catch(e){console.log("Gist read:",e.message);return null}
}

// Write to Gist (needs token)
async function writeGist(gistId,token,filesOrData){
  if(!gistId||!token)return false;
  try{
    // If filesOrData has string keys like "archive.json", it's a multi-file write
    // Otherwise treat it as archive data for backward compatibility
    const gistFiles={};
    if(filesOrData&&typeof filesOrData==="object"&&!Array.isArray(filesOrData)&&Object.keys(filesOrData).some(k=>k.includes("."))){
      for(const[name,data]of Object.entries(filesOrData))gistFiles[name]={content:JSON.stringify(data)};
    }else{
      gistFiles["archive.json"]={content:JSON.stringify(filesOrData)};
    }
    const r=await fetch(`https://api.github.com/gists/${gistId}`,{
      method:"PATCH",
      headers:{"Authorization":`Bearer ${token}`,"Accept":"application/vnd.github+json","Content-Type":"application/json"},
      body:JSON.stringify({files:gistFiles})
    });
    return r.ok;
  }catch(e){console.log("Gist write:",e.message);return false}
}

// ─── Utils ─────────────────────────────────────────
const fmt=n=>{if(!n&&n!==0)return"$0";if(n>=1e6)return`$${(n/1e6).toFixed(2)}M`;if(n>=1e3)return`$${(n/1e3).toFixed(1)}K`;return`$${Math.round(n)}`};
const pct=n=>`${(n*100).toFixed(1)}%`;
const sleep=ms=>new Promise(r=>setTimeout(r,ms));
const ago=h=>{if(h<1)return`${Math.round(h*60)}m`;if(h<24)return`${Math.round(h)}h`;if(h<168)return`${(h/24).toFixed(1)}d`;return`${(h/168).toFixed(1)}w`};
const ts=d=>{if(!d)return"—";const dt=d instanceof Date?d:new Date(d);return dt.toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit"})};
const ds=d=>{if(!d)return"";const dt=d instanceof Date?d:new Date(d);return dt.toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit"})};

// ─── Audio ─────────────────────────────────────────
const playSound=sev=>{try{const c=new(window.AudioContext||window.webkitAudioContext)(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type=sev==="critical"?"sawtooth":"sine";o.frequency.value=sev==="critical"?880:660;g.gain.setValueAtTime(.3,c.currentTime);g.gain.exponentialRampToValueAtTime(.001,c.currentTime+(sev==="critical"?.8:.4));o.start(c.currentTime);o.stop(c.currentTime+1);if(sev==="critical")setTimeout(()=>{const o2=c.createOscillator(),g2=c.createGain();o2.connect(g2);g2.connect(c.destination);o2.type="sawtooth";o2.frequency.value=1100;g2.gain.setValueAtTime(.3,c.currentTime);g2.gain.exponentialRampToValueAtTime(.001,c.currentTime+.6);o2.start(c.currentTime);o2.stop(c.currentTime+.7)},300)}catch(e){}};

const sendNotif=(title,body,sev)=>{if(Notification.permission!=="granted")return;try{const n=new Notification(title,{body,tag:`pm-${Date.now()}`,requireInteraction:sev==="critical",vibrate:[200,100,200]});setTimeout(()=>n.close(),15000)}catch(e){}};

// ─── EmailJS ───────────────────────────────────────
let ejsLoaded=false;
const loadEJS=()=>{if(ejsLoaded)return Promise.resolve();return new Promise((res,rej)=>{const s=document.createElement("script");s.src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js";s.onload=()=>{ejsLoaded=true;res()};s.onerror=()=>rej(new Error("EmailJS load failed"));document.head.appendChild(s)})};
const buildEmailTxt=(sigs)=>{let t=`🔍 PM INSIDER SIGNAL DETECTOR\n${new Date().toLocaleString("it-IT")}\n${sigs.length} segnali (${sigs.filter(s=>s.maxSeverity==="critical").length} critici)\n${"─".repeat(36)}\n\n`;for(const s of sigs.slice(0,10)){t+=`${s.maxSeverity==="critical"?"🔴":s.maxSeverity==="alert"?"🟠":"🔵"} ${s.market.question}\nScore:${s.totalWeight} | Vol24h:${fmt(s.meta.vol24h)} | YES:${pct(s.meta.yesPrice)}\n`;for(const d of s.detections)t+=`  ${d.icon} ${d.label}: ${d.detail}\n`;t+=`  → https://polymarket.com/event/${s.market.slug}\n\n`}return t};
const sendEJS=async(sid,tid,pk,to,sigs)=>{try{await loadEJS();const sum=`${sigs.length} segnali (${sigs.filter(s=>s.maxSeverity==="critical").length} critici)`;const r=await window.emailjs.send(sid,tid,{to_email:to,subject:`🔍 PM Alert: ${sum}`,message:buildEmailTxt(sigs),timestamp:new Date().toLocaleString("it-IT")},pk);return r.status===200}catch(e){console.error("EJS:",e);return false}};

// ─── Platform detection (outside component) ───────
const UA=navigator.userAgent||"";
const IS_IOS=UA.indexOf("iPad")>=0||UA.indexOf("iPhone")>=0||UA.indexOf("iPod")>=0;
const IS_ANDROID=UA.indexOf("Android")>=0;
const IS_STANDALONE=window.matchMedia("(display-mode:standalone)").matches||window.navigator.standalone===true;
const GEO_RE=new RegExp("politic|geopolit|military|war|conflict|government|election|diplomacy|sanction|regime","i");

// ─── Category Detection ─────────────────────────────
const CAT_RE={
  "⚽ Sport": /nba|nfl|nhl|mlb|nascar|mma|ufc|epl|serie.a|bundesliga|ligue|premier.league|champions.league|ncaa|tennis|golf|cricket|wnba|mls|la.liga|football|basketball|baseball|hockey|soccer|boxing|f1|formula/i,
  "🏛 Politica": /politic|election|president|governor|senat|congress|parliament|vote|democrat|republican|trump|biden|legislation|law|supreme.court|impeach|cabinet|prime.minister/i,
  "🌍 Geopolitica": /geopolit|military|war|conflict|sanction|regime|nuclear|nato|diplomacy|ceasefire|invasion|troops|missile|iran|russia|china|ukraine|north.korea|israel|hamas|hezbollah/i,
  "💰 Finanza": /bitcoin|btc|eth|crypto|stock|price|market.cap|sp500|nasdaq|fed|interest.rate|inflation|gdp|recession|ipo|trade|tariff|dollar|euro|gold|oil|commodity/i,
  "🔬 Scienza & Tech": /ai|artificial.intelligence|openai|google|apple|microsoft|meta|spacex|nasa|launch|fda|drug|vaccine|clinical|research|patent|quantum|chip|semiconductor/i,
  "🎭 Cultura & Media": /oscar|emmy|grammy|box.office|movie|film|album|spotify|youtube|tiktok|twitter|celebrity|royal|award|entertainment/i,
  "⚖️ Giustizia": /court|trial|verdict|lawsuit|judge|conviction|indictment|plea|attorney|legal|fbi|doj|sec|investigation/i,
  "🌦 Clima & Ambiente": /climate|weather|hurricane|earthquake|wildfire|temperature|flood|drought|emission|carbon|renewable|energy/i,
};
const ALL_CATS=Object.keys(CAT_RE).concat(["📦 Altro"]);
function detectCategory(question, tags) {
  const text = (question + " " + tags.join(" ")).toLowerCase();
  for (const [cat, re] of Object.entries(CAT_RE)) {
    if (re.test(text)) return cat;
  }
  return "📦 Altro";
}

// ─── Signal Engine v2 — optimized from backtest ──────
// Category-based filtering replaces hardcoded sport filter

function analyze(markets,ph,cfg){
  const sigs=[];
  const v24s=markets.map(m=>parseFloat(m.volume24hr)||0).filter(v=>v>0);
  const medV=v24s.sort((a,b)=>a-b)[Math.floor(v24s.length/2)]||1000;
  const tc={};
  for(const m of markets)for(const t of m.tags||[]){const l=t.label||t.slug||t;tc[l]=(tc[l]||0)+1}

  for(const m of markets){
    const vol=parseFloat(m.volume)||0,v24=parseFloat(m.volume24hr)||0,liq=parseFloat(m.liquidity)||0;
    const prices=JSON.parse(m.outcomePrices||"[]").map(Number),yP=prices[0]||0;
    const cr=new Date(m.createdAt),aH=(Date.now()-cr)/36e5;
    const tags=(m.tags||[]).map(t=>t.label||t.slug||""),sp=m._spread||0,bi=m._bookImbalance||0,prH=ph[m.id]||null;
    const q=(m.question||"").toLowerCase();

    // Detect category and skip excluded ones
    const category=detectCategory(m.question||"",tags);
    if(cfg.excludedCats&&cfg.excludedCats.includes(category))continue;

    const det=[];

    // NEW TYPE — highest precision signal (100% in backtest)
    const rare=tags.some(t=>(tc[t]||0)<=cfg.rareCategoryMax);
    if(rare&&aH<cfg.newTypeMaxAge)det.push({signal:"NEW_TYPE",icon:"🆕",label:"Nuova tipologia",severity:v24>cfg.newTypeMinVol?"critical":"watch",weight:v24>cfg.newTypeMinVol?4:2,detail:`Cat. rara — creato ${ago(aH)} fa`,insight:"Precisione 100% nel backtest. Mercati nicchia = veicolo insider preferito."});

    // VOLUME SURGE — now checks velocity (concentrated vs gradual)
    const vR=vol>0?v24/vol:0,vM=v24/Math.max(medV,1);
    // Volume velocity: if market is young (< 72h) and vol24h is high relative to total, volume is CONCENTRATED
    const isConcentrated=aH<72&&vR>0.5; // >50% of all-time vol in 24h on a young market
    if(v24>cfg.surgeMinVol&&(vR>cfg.surgeRatio||vM>cfg.surgeVsMedian)){
      const big=vR>cfg.surgeRatio*2||vM>cfg.surgeVsMedian*3;
      // Boost weight if concentrated, reduce if gradual
      const velBoost=isConcentrated?2:0;
      const w=big?5+velBoost:3+velBoost;
      det.push({signal:"VOLUME_SURGE",icon:"📊",label:"Picco volume",severity:big||isConcentrated?"critical":"alert",weight:Math.min(w,7),
        detail:`24h ${fmt(v24)}=${(vR*100).toFixed(0)}% tot, ${vM.toFixed(1)}x med${isConcentrated?" ⚡CONCENTRATO":""}`,
        insight:isConcentrated?"Volume concentrato in poche ore su mercato giovane = pattern tipico insider (Maduro, Iran).":"Volume elevato ma potrebbe essere graduale. Verificare timing rispetto a notizie pubbliche."});
    }

    // PRICE DISLOCATION
    if(prH&&prH.length>=3){const r=prH.slice(-6),sw=Math.abs((r[r.length-1]?.p||yP)-(r[0]?.p||yP));if(sw>cfg.priceSwingMin)det.push({signal:"PRICE_DISLOCATION",icon:"⚡",label:"Prezzo dislocato",severity:sw>cfg.priceSwingMin*2?"critical":"alert",weight:sw>cfg.priceSwingMin*2?5:3,detail:`Swing ${pct(sw)}`,insight:"Verificare: swing PRIMA di notizie = sospetto. DOPO notizie = reazione legittima."})}

    // VOL/LIQ IMBALANCE — high precision (67% in backtest)
    if(v24>cfg.surgeMinVol&&liq>0&&v24/liq>cfg.volLiqImbalance)det.push({signal:"LIQ_IMBALANCE",icon:"💧",label:"Squil. Vol/Liq",severity:v24/liq>cfg.volLiqImbalance*2?"critical":"alert",weight:v24/liq>cfg.volLiqImbalance*2?4:2,detail:`${fmt(v24)} su ${fmt(liq)} liq (${(v24/liq).toFixed(1)}x)`,insight:"Precisione 67%. Acquisto aggressivo su book sottile = urgenza tipica insider."});

    // BOOK SKEW — now only on UNCERTAIN markets (price 20-80%), raised threshold
    const isUncertain=yP>0.2&&yP<0.8;
    if(Math.abs(bi)>cfg.bookSkewThreshold&&isUncertain){
      const dir=bi>0?"BID":"ASK";
      det.push({signal:"BOOK_SKEW",icon:"📐",label:"Book sbilanciato",severity:Math.abs(bi)>cfg.bookSkewThreshold*1.5?"alert":"watch",weight:Math.abs(bi)>cfg.bookSkewThreshold*1.5?3:1,detail:`${pct(Math.abs(bi))} → ${dir} (mkt incerto ${pct(yP)})`,insight:"Book sbilanciato su mercato incerto (20-80%) indica pressione informata, non consenso."});
    }

    // NICHE HEAT
    if(vol<cfg.nicheMaxTotalVol&&v24>cfg.nicheMinDailyVol&&v24/Math.max(vol,1)>cfg.nicheHeatRatio)det.push({signal:"NICHE_HEAT",icon:"🔍",label:"Nicchia attiva",severity:"alert",weight:3,detail:`${fmt(vol)} tot ma ${fmt(v24)} oggi`,insight:"Mercati oscuri improvvisamente attivi = pattern Axiom, Google YIS."});

    // GEO SENSITIVE
    const eD=m.endDate?new Date(m.endDate):null,hE=eD?(eD-Date.now())/36e5:Infinity;
    const isG=tags.some(t=>GEO_RE.test(t));
    if(isG&&hE<cfg.geoExpiryHours&&v24>cfg.surgeMinVol)det.push({signal:"GEO_SENSITIVE",icon:"🌐",label:"Geo sensibile",severity:"critical",weight:4,detail:`Scad. ${ago(hE)}, vol ${fmt(v24)}`,insight:"Verificare: volume pre-notizia = insider. Post-notizia = reazione pubblica."});

    // INFORMED FLOW — highest precision (100% in backtest)
    if(sp>cfg.spreadWide&&v24>cfg.surgeMinVol)det.push({signal:"INFORMED_FLOW",icon:"🎯",label:"Flusso informato",severity:"alert",weight:3,detail:`Spread ${pct(sp)}, vol ${fmt(v24)}`,insight:"Precisione 100%. MM allarga spread per adverse selection — volume in queste condizioni = fortemente sospetto."});

    if(det.length>0){
      let tw=det.reduce((s,d)=>s+d.weight,0);

      // SCORE MULTIPLIER based on signal count (from backtest: real insider = 6-7 signals, FP = 2-3)
      const nSigs=det.length;
      if(nSigs>=5)tw=Math.round(tw*1.5);      // Strong combo = boost
      else if(nSigs>=4)tw=Math.round(tw*1.2);
      else if(nSigs<=2)tw=Math.round(tw*0.6);  // Few signals = likely noise

      // CONFIDENCE LEVEL based on which signals fired
      const hasGoldSignal=det.some(d=>d.signal==="NEW_TYPE"||d.signal==="INFORMED_FLOW"||d.signal==="LIQ_IMBALANCE");
      const hasConcentrated=det.some(d=>d.detail&&d.detail.includes("CONCENTRATO"));
      const confidence=nSigs>=5&&hasGoldSignal?"ALTA":nSigs>=3&&(hasGoldSignal||hasConcentrated)?"MEDIA":"BASSA";

      const ms=det.some(d=>d.severity==="critical")?"critical":det.some(d=>d.severity==="alert")?"alert":"watch";
      sigs.push({market:m,detections:det,totalWeight:tw,maxSeverity:ms,confidence,category,meta:{vol,vol24h:v24,liq,yesPrice:yP,ageH:aH,spread:sp,bookImbalance:bi,tags,hoursToExpiry:hE,priceHistory:prH}});
    }
  }
  return sigs.filter(s=>s.totalWeight>=cfg.minAlertScore).sort((a,b)=>b.totalWeight-a.totalWeight);
}

const SEV={critical:{color:"#ff2d55",bg:"#ff2d5512",bdr:"#ff2d5540",l:"CRITICO"},alert:{color:"#ff9f0a",bg:"#ff9f0a12",bdr:"#ff9f0a40",l:"ALLERTA"},watch:{color:"#64d2ff",bg:"#64d2ff12",bdr:"#64d2ff40",l:"MONITOR"}};

// ─── Spark ─────────────────────────────────────────
function Spark({data,w=90,h=24}){if(!data||data.length<2)return null;const vs=data.map(d=>d.p),mn=Math.min(...vs),mx=Math.max(...vs),rg=mx-mn||1;const pts=vs.map((v,i)=>`${(i/(vs.length-1))*w},${h-((v-mn)/rg)*h}`).join(" ");const up=vs[vs.length-1]>vs[0];return React.createElement("svg",{width:w,height:h,style:{display:"block"}},React.createElement("polyline",{points:pts,fill:"none",stroke:up?"#34c759":"#ff2d55",strokeWidth:"1.5",strokeLinejoin:"round"}),React.createElement("circle",{cx:w,cy:h-((vs[vs.length-1]-mn)/rg)*h,r:"2",fill:up?"#34c759":"#ff2d55"}))}

  const[aLog,setALog]=useState([]);

  const[archive,setArchive]=useState(()=>loadArchiveLocal());

  const[gistId,setGistId]=useState(gistCfg.gistId||"");
  const[gistToken,setGistToken]=useState(gistCfg.gistToken||"");

  // Sync archive from Gist on startup
  useEffect(()=>{
    if(!gistId)return;
    (async()=>{
      setGistSyncing(true);
      const remote=await readGist(gistId,gistToken);
      if(remote&&remote.length>0){
        // Merge: remote + local outcomes
        const local=loadArchiveLocal();
        const merged=[...remote];
        for(const l of local){
          const idx=merged.findIndex(r=>r.id===l.id||r.marketId===l.marketId&&Math.abs(new Date(r.scanTime).getTime()-new Date(l.scanTime).getTime())<60000);
          if(idx>=0&&l.outcome&&!merged[idx].outcome){
            merged[idx]={...merged[idx],outcome:l.outcome,outcomeNote:l.outcomeNote,outcomeTime:l.outcomeTime};
          }else if(idx<0){
            merged.push(l);
          }
        }
        merged.sort((a,b)=>new Date(a.scanTime)-new Date(b.scanTime));
        const trimmed=merged.slice(-1000);
        setArchive(trimmed);
        saveArchiveLocal(trimmed);
      }
      setGistSyncing(false);
    })();
  },[gistId,gistToken]);

  // Save Gist settings
  useEffect(()=>{saveGistSettings({gistId,gistToken})},[gistId,gistToken]);

  // Archive signals after scan — save locally + push to Gist
  const archiveSignals=useCallback((sigs)=>{
    const now=Date.now();
    const newEntries=sigs.map(s=>({
      id:`${s.market.id}_${now}`,
      marketId:s.market.id,
      question:s.market.question,
      slug:s.market.slug,
      score:s.totalWeight,
      severity:s.maxSeverity,
      confidence:s.confidence,
      category:s.category||"📦 Altro",
      vol24h:s.meta.vol24h,
      yesPrice:s.meta.yesPrice,
      ageH:s.meta.ageH,
      signals:s.detections.map(d=>({signal:d.signal,label:d.label,weight:d.weight,detail:d.detail})),
      scanTime:new Date(now).toISOString(),
      outcome:null,
      outcomeNote:"",
      outcomeTime:null,
    }));
    setArchive(prev=>{
      const merged=[...prev];
      for(const entry of newEntries){
        const dup=merged.find(a=>a.marketId===entry.marketId&&(now-new Date(a.scanTime).getTime())<43200000);
        if(!dup)merged.push(entry);
      }
      const trimmed=merged.slice(-1000);
      saveArchiveLocal(trimmed);
      // Async push to Gist (non-blocking)
      if(gistId&&gistToken)writeGist(gistId,gistToken,trimmed).then(ok=>{if(ok)console.log("Gist synced")});
      return trimmed;
    });
  },[gistId,gistToken]);

  // Update outcome for an archived signal
  const setOutcome=useCallback((id,outcome,note)=>{
    setArchive(prev=>{
      const updated=prev.map(a=>a.id===id?{...a,outcome,outcomeNote:note||a.outcomeNote,outcomeTime:new Date().toISOString()}:a);
      saveArchiveLocal(updated);
      if(gistId&&gistToken)writeGist(gistId,gistToken,updated).then(ok=>{if(ok)console.log("Outcome synced to Gist")});
      return updated;
    });
  },[gistId,gistToken]);

  // Export archive as JSON
  const exportArchive=useCallback(()=>{

    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`pm-scanner-archive-${new Date().toISOString().slice(0,10)}.json`;
    a.click();URL.revokeObjectURL(url);
  },[archive]);

  // ── Translation ──
  const[translations,setTranslations]=useState({});
  const[translating,setTranslating]=useState(null);
  const translateText=useCallback(async(id,text)=>{
    if(translations[id])return;
    setTranslating(id);
    try{
      // MyMemory Translation API - free, no key needed, 5000 chars/day
      const url=`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|it`;
      const r=await fetch(url);
      if(r.ok){
        const d=await r.json();
        const translated=d.responseData?.translatedText;
        if(translated&&translated.toLowerCase()!==text.toLowerCase()){
          setTranslations(p=>({...p,[id]:translated}));
        }else{
          // Fallback: semplice dizionario per termini comuni di Polymarket
          const simple=text
            .replace(/\bWill\b/gi,"")
            .replace(/\bby\b/gi,"entro")
            .replace(/\bbefore\b/gi,"prima di")
            .replace(/\bafter\b/gi,"dopo")
            .replace(/\bWin\b/gi,"Vincerà")
            .replace(/\blose\b/gi,"perderà")
            .replace(/\breached?\b/gi,"raggiungere")
            .replace(/\bprice\b/gi,"prezzo")
            .replace(/\babove\b/gi,"sopra")
            .replace(/\bbelow\b/gi,"sotto")
            .replace(/\bYes\b/gi,"Sì")
            .replace(/\bNo\b/gi,"No")
            .replace(/\?/g,"?")
            .trim();
          setTranslations(p=>({...p,[id]:simple}));
        }
      }
    }catch(e){
      console.log("Translation failed:",e);
      // Fallback offline
      setTranslations(p=>({...p,[id]:"[Traduzione non disponibile]"}));
    }
    setTranslating(null);
  },[translations]);
  const translateAll=useCallback(async(sigs)=>{
    for(const s of sigs.slice(0,15)){
      if(!translations[s.market.id]){
        await translateText(s.market.id,s.market.question);
        await new Promise(r=>setTimeout(r,500)); // Rate limit
      }
    }
  },[translations,translateText]);

  // ── Text size ──
  const[textScale,setTextScale]=useState(parseFloat(saved.textScale||1));
  useEffect(()=>{const r=document.getElementById("root");if(r)r.style.zoom=textScale;saveSettings({cfg,schMin,ch,ejsPK,ejsSI,ejsTI,emTo,tgTok,tgCid,minSev,textScale})},[textScale]);

  // ── Install PWA state ──
  const[installPrompt,setInstallPrompt]=useState(null);
  const[showInstall,setShowInstall]=useState(false);
  const isIOS=IS_IOS;
  const isAndroid=IS_ANDROID;
  const isStandalone=IS_STANDALONE;

  // Listen for install prompt (Android/Chrome)
  useEffect(()=>{
    const handler=(e)=>{e.preventDefault();setInstallPrompt(e);if(!isStandalone&&!localStorage.getItem('pm_install_dismissed'))setShowInstall(true)};
    window.addEventListener('beforeinstallprompt',handler);
    // Auto-show install for non-standalone users on first visit
    if(!isStandalone&&!localStorage.getItem('pm_install_dismissed')){
      setTimeout(()=>{setShowInstall(true);setPanel("settings");setSTab("install")},1500);
    }
    return()=>window.removeEventListener('beforeinstallprompt',handler);
  },[]);

  const doInstall=async()=>{if(installPrompt){installPrompt.prompt();const r=await installPrompt.userChoice;if(r.outcome==='accepted')setShowInstall(false);setInstallPrompt(null)}};
  const dismissInstall=()=>{setShowInstall(false);localStorage.setItem('pm_install_dismissed','1')};

  // Persist settings on change
  useEffect(()=>{saveSettings({cfg,schMin,ch,ejsPK,ejsSI,ejsTI,emTo,tgTok,tgCid,minSev,textScale})},[cfg,schMin,ch,ejsPK,ejsSI,ejsTI,emTo,tgTok,tgCid,minSev,textScale]);

  useEffect(()=>{if("Notification" in window)setNotifSt(Notification.permission);else setNotifSt("unsupported")},[]);

  // Countdown
  useEffect(()=>{if(!schOn||!nextScan){setCd("");return}const iv=setInterval(()=>{const d=nextScan-Date.now();if(d<=0){setCd("Scanning...");return}const m=Math.floor(d/6e4),s=Math.floor((d%6e4)/1e3);setCd(`${m}:${s.toString().padStart(2,"0")}`)},1000);return()=>clearInterval(iv)},[schOn,nextScan]);

  // Alerts
  const fire=useCallback(async(dets)=>{
    const so={critical:0,alert:1,watch:2},mi=so[minSev]??1;
    const ta=dets.filter(s=>so[s.maxSeverity]<=mi);if(!ta.length)return;
    const sum=`${ta.length} segnali (${ta.filter(s=>s.maxSeverity==="critical").length} crit)`,top=ta[0];
    if(ch.sound)playSound(top.maxSeverity);
    if(ch.browser&&Notification.permission==="granted")sendNotif(`🔍 PM: ${sum}`,`Top: ${top.market.question}`,top.maxSeverity);
    if(ch.telegram&&tgTok&&tgCid){let msg=`<b>🔍 PM Insider Alert</b>\n${new Date().toLocaleString("it-IT")}\n\n<b>${sum}</b>\n\n`;for(const s of ta.slice(0,5)){msg+=`${s.maxSeverity==="critical"?"🔴":"🟠"} <b>${s.market.question}</b>\nScore:${s.totalWeight} | ${fmt(s.meta.vol24h)} | ${pct(s.meta.yesPrice)}\n${s.detections.map(d=>`  ${d.icon} ${d.label}`).join("\n")}\n\n`}const ok=await sendTG(tgTok,tgCid,msg);setALog(p=>[...p,{t:new Date(),ch:"telegram",ok,n:ta.length}].slice(-50))}
    if(ch.email&&emTo&&ejsPK&&ejsSI&&ejsTI){const ok=await sendEJS(ejsSI,ejsTI,ejsPK,emTo,ta);setALog(p=>[...p,{t:new Date(),ch:"email",ok,n:ta.length}].slice(-50))}
    setALog(p=>[...p,{t:new Date(),ch:"summary",n:ta.length,c:ta.filter(s=>s.maxSeverity==="critical").length}].slice(-50));
  },[ch,minSev,emTo,ejsPK,ejsSI,ejsTI,tgTok,tgCid]);

  // Scan
  const scan=useCallback(async(auto=false)=>{
    if(loading)return;setLoading(true);setError(null);if(!auto)setSignals([]);
    abRef.current=new AbortController();const sg=abRef.current.signal;
    try{
      // PHASE 1: Fetch markets (sequential, not parallel — proxy friendly)
      let all=[];const pgs=useProxy?4:8; // fewer pages when proxied
      for(let i=0;i<pgs;i++){
        setProgress({t:`Mercati (${i+1}/${pgs})...`,p:((i+1)/pgs)*30});
        const r=await smartFetch(`${GAMMA}/markets?closed=false&active=true&limit=100&offset=${i*100}&order=volume24hr&ascending=false`,{signal:sg});
        if(!r){setProgress({t:"Connessione instabile, analizzo dati parziali...",p:30});break}
        const d=await r.json();
        if(!d.length)break;
        all=all.concat(d);
        await sleep(useProxy?500:250);
      }
      if(!all.length)throw new Error("Nessun mercato caricato. Controlla la connessione.");

      // PHASE 2: Orderbook — only top 30 (not 100), sequential batches of 2
      setProgress({t:"Orderbook...",p:35});
      const top=all.filter(m=>(parseFloat(m.volume24hr)||0)>0).sort((a,b)=>(parseFloat(b.volume24hr)||0)-(parseFloat(a.volume24hr)||0)).slice(0,useProxy?30:80);
      let obDone=0;
      for(let i=0;i<top.length;i+=(useProxy?2:5)){
        const batch=top.slice(i,i+(useProxy?2:5));
        await Promise.all(batch.map(async m=>{try{
          const tks=JSON.parse(m.clobTokenIds||"[]");if(!tks[0])return;
          const bR=await smartFetch(`${CLOB}/book?token_id=${tks[0]}`,{signal:sg});
          if(!bR)return;
          const bk=await bR.json();
          const bV=(bk.bids||[]).reduce((s,b)=>s+parseFloat(b.size||0),0);
          const aV=(bk.asks||[]).reduce((s,a)=>s+parseFloat(a.size||0),0);
          const tt=bV+aV;
          m._bookImbalance=tt>0?(bV-aV)/tt:0;
          const bb=bk.bids?.[0]?.price?parseFloat(bk.bids[0].price):0;
          const ba=bk.asks?.[0]?.price?parseFloat(bk.asks[0].price):1;
          m._spread=ba-bb;
        }catch(e){}}));
        obDone=Math.min(i+(useProxy?2:5),top.length);
        setProgress({t:`OB (${obDone}/${top.length})`,p:35+(obDone/top.length)*35});
        await sleep(useProxy?600:180);
      }

      // PHASE 3: Price history — only top 20 when proxied, sequential
      setProgress({t:"Prezzi...",p:72});
      const prH={};
      const cands=top.slice(0,useProxy?20:50);
      for(let i=0;i<cands.length;i+=(useProxy?2:5)){
        const batch=cands.slice(i,i+(useProxy?2:5));

          const tks=JSON.parse(m.clobTokenIds||"[]");if(!tks[0])return;

          if(!r)return;
          const d=await r.json();
          if(d.history?.length)prH[m.id]=d.history.map(h=>({t:h.t,p:parseFloat(h.p)}));
        }catch(e){}}));
        setProgress({t:`Prezzi (${Math.min(i+(useProxy?2:5),cands.length)}/${cands.length})`,p:72+(Math.min(i+(useProxy?2:5),cands.length)/cands.length)*20});
        await sleep(useProxy?600:180);
      }

      // PHASE 4: Analyze
      setProgress({t:"Analisi...",p:95});await sleep(50);
      const det=analyze(all,prH,cfg);setSignals(det);
      const st={scanned:all.length,signals:det.length,critical:det.filter(s=>s.maxSeverity==="critical").length,alert:det.filter(s=>s.maxSeverity==="alert").length,watch:det.filter(s=>s.maxSeverity==="watch").length};

      const toArchive=det.filter(s=>s.maxSeverity==="critical"||s.maxSeverity==="alert");
      if(toArchive.length>0) archiveSignals(toArchive);
      if(det.length>0)await fire(det);
    }catch(e){if(e.name!=="AbortError")setError(e.message)}finally{setLoading(false)}

  // Keep a ref to the latest scan so scheduler always uses current cfg

  // Scheduler
  useEffect(()=>{if(schRef.current)clearInterval(schRef.current);if(!schOn){setNextScan(null);return}const ms=schMin*6e4;setNextScan(new Date(Date.now()+ms));schRef.current=setInterval(()=>{setNextScan(new Date(Date.now()+ms));scanRef.current(true)},ms);return()=>{if(schRef.current)clearInterval(schRef.current)}},[schOn,schMin]);

              </div>
              <div>
                <div style={{fontSize:12,color:"var(--dim3)",fontWeight:600,marginBottom:4}}>GitHub Token (permesso gist)</div>
                <input placeholder="ghp_xxxxxxxxxxxx" value={gistToken} onChange={e=>setGistToken(e.target.value)} type="password" style={IS}/>
              </div>
            </div>

            <div style={{display:"flex",gap:8,marginBottom:12}}>
              <button onClick={async()=>{
                if(!gistId){alert("Inserisci il Gist ID");return}
                setGistSyncing(true);
                const data=await readGist(gistId,gistToken);
                if(data!==null){
                  setArchive(data);saveArchiveLocal(data);
                  alert(`✅ Caricati ${data.length} record dal Gist`);
                }else alert("❌ Impossibile leggere il Gist. Verifica ID e token.");
                setGistSyncing(false);
              }} style={{padding:"10px 16px",borderRadius:8,border:"1px solid var(--blu)40",background:"var(--blu)10",color:"var(--blu)",fontSize:14,fontWeight:600,minHeight:44,flex:1}}>
                {gistSyncing?"⏳ Sync...":"⬇ Scarica da Gist"}
              </button>
              <button onClick={async()=>{
                if(!gistId||!gistToken){alert("Servono Gist ID e Token per scrivere");return}
                setGistSyncing(true);
                const ok=await writeGist(gistId,gistToken,archive);
                alert(ok?`✅ ${archive.length} record salvati su Gist`:"❌ Scrittura fallita. Verifica token.");
                setGistSyncing(false);
              }} style={{padding:"10px 16px",borderRadius:8,border:"1px solid var(--grn)40",background:"var(--grn)10",color:"var(--grn)",fontSize:14,fontWeight:600,minHeight:44,flex:1}}>
                ⬆ Salva su Gist
              </button>
            </div>

            {gistId&&<div style={{padding:10,borderRadius:8,background:gistId&&gistToken?"#34c75910":"#ff9f0a10",border:`1px solid ${gistId&&gistToken?"#34c75930":"#ff9f0a30"}`,fontSize:13}}>
              <div style={{color:gistId&&gistToken?"var(--grn)":"var(--org)",fontWeight:600}}>
                {gistId&&gistToken?"✅ Cloud configurato — sync automatico attivo":"⚠ Solo Gist ID — lettura OK, scrittura richiede token"}
              </div>
              <div style={{color:"var(--dim3)",fontSize:12,marginTop:4}}>{archive.length} record in archivio locale</div>
            </div>}

            <div style={{marginTop:12,padding:10,borderRadius:8,background:"var(--card)",border:"1px solid var(--brd)",fontSize:12,color:"var(--dim3)",lineHeight:1.6}}>
              💡 <strong>Per GitHub Actions:</strong> aggiungi gli stessi valori come Secrets nel repo:<br/>
              <code>GIST_ID</code> e <code>GIST_TOKEN</code> in Settings → Secrets → Actions
            </div>
          </div>}

          {/* ─── INSTALL ─── */}
          {sTab==="install"&&<div>
            {isStandalone?
              <div style={{textAlign:"center",padding:20,color:"var(--grn)",fontSize:16,fontWeight:600}}>✅ App già installata!</div>
            :<div>
              {installPrompt&&<div style={{marginBottom:14}}>
                <button onClick={doInstall} style={{width:"100%",padding:"14px",borderRadius:10,background:"linear-gradient(135deg,#bf5af2,#8b5cf6)",color:"#fff",fontSize:15,fontWeight:700,marginBottom:8,minHeight:48}}>📱 Installa PM Scanner</button>
              </div>}
              <div style={{marginBottom:10,padding:14,borderRadius:8,background:"var(--card)",border:"1px solid var(--brd)"}}>
                <div style={{fontSize:14,fontWeight:700,color:"var(--blu)",marginBottom:8}}>🍎 iPhone/iPad (Safari)</div>
                <div style={{fontSize:13,color:"var(--txt2)",lineHeight:1.7}}>1. Apri in Safari → 2. Tocca ⬆ Condividi → 3. "Aggiungi a schermata Home" → 4. "Aggiungi"</div>
              </div>
              <div style={{marginBottom:10,padding:14,borderRadius:8,background:"var(--card)",border:"1px solid var(--brd)"}}>
                <div style={{fontSize:14,fontWeight:700,color:"var(--grn)",marginBottom:8}}>🤖 Android (Chrome)</div>
                <div style={{fontSize:13,color:"var(--txt2)",lineHeight:1.7}}>1. Apri in Chrome → 2. Tocca banner "Installa" → oppure menu ⋮ → "Installa app"</div>
              </div>
              <div style={{padding:14,borderRadius:8,background:"var(--card)",border:"1px solid var(--brd)"}}>
                <div style={{fontSize:14,fontWeight:700,color:"var(--org)",marginBottom:8}}>🖥 Desktop (Chrome/Edge)</div>
                <div style={{fontSize:13,color:"var(--txt2)",lineHeight:1.7}}>1. Apri in Chrome → 2. Icona 📥 nella barra indirizzi → 3. "Installa"</div>
              </div>
            </div>}
          </div>}
        </div>}

        {/* HISTORY */}
        {panel==="history"&&<div style={PS}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:16,fontWeight:700}}>📋 Storico & Tracking</div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={exportArchive} style={{padding:"8px 14px",borderRadius:8,border:"1px solid var(--blu)40",background:"var(--blu)10",color:"var(--blu)",fontSize:13,fontWeight:600}}>📥 Esporta JSON</button>
            </div>
          </div>

          {/* Stats riepilogo */}
          {(()=>{
            const rated=archive.filter(a=>a.outcome);
            const tp=archive.filter(a=>a.outcome==="tp").length;
            const fp=archive.filter(a=>a.outcome==="fp").length;
            const pending=archive.filter(a=>!a.outcome).length;
            const accuracy=rated.length>0?((tp/(tp+fp))*100).toFixed(0):"-";
            const critArchive=archive.filter(a=>a.severity==="critical");
            const critTP=critArchive.filter(a=>a.outcome==="tp").length;
            const critFP=critArchive.filter(a=>a.outcome==="fp").length;
            const critAcc=critTP+critFP>0?((critTP/(critTP+critFP))*100).toFixed(0):"-";

            // Per-signal stats
            const sigStats={};
            for(const a of archive){
              for(const s of a.signals||[]){
                if(!sigStats[s.signal])sigStats[s.signal]={label:s.label,total:0,tp:0,fp:0,pending:0};
                sigStats[s.signal].total++;
                if(a.outcome==="tp")sigStats[s.signal].tp++;
                else if(a.outcome==="fp")sigStats[s.signal].fp++;
                else sigStats[s.signal].pending++;
              }
            }

            return <div>
              {/* Summary cards */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginBottom:14}}>
                <div style={{padding:"10px 8px",borderRadius:8,background:"var(--card)",border:"1px solid var(--brd)",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:700,color:"var(--txt)"}}>{archive.length}</div>
                  <div style={{fontSize:11,color:"var(--dim3)"}}>Totali</div>
                </div>
                <div style={{padding:"10px 8px",borderRadius:8,background:"#34c75910",border:"1px solid #34c75930",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:700,color:"var(--grn)"}}>{tp}</div>
                  <div style={{fontSize:11,color:"var(--grn)"}}>✅ Veri</div>
                </div>
                <div style={{padding:"10px 8px",borderRadius:8,background:"#ff2d5510",border:"1px solid #ff2d5530",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:700,color:"var(--red)"}}>{fp}</div>
                  <div style={{fontSize:11,color:"var(--red)"}}>❌ Falsi</div>
                </div>
                <div style={{padding:"10px 8px",borderRadius:8,background:"var(--card)",border:"1px solid var(--brd)",textAlign:"center"}}>
                  <div style={{fontSize:20,fontWeight:700,color:"var(--org)"}}>{pending}</div>
                  <div style={{fontSize:11,color:"var(--org)"}}>⏳ Pending</div>
                </div>
              </div>

              {/* Accuracy */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:14}}>
                <div style={{padding:"12px 14px",borderRadius:8,background:"var(--card)",border:"1px solid var(--brd)"}}>
                  <div style={{fontSize:12,color:"var(--dim3)",marginBottom:4}}>ACCURATEZZA TOTALE</div>
                  <div style={{fontSize:24,fontWeight:700,color:accuracy!=="-"&&parseInt(accuracy)>50?"var(--grn)":"var(--txt)"}}>{accuracy}%</div>
                  <div style={{fontSize:12,color:"var(--dim)"}}>{tp} veri / {tp+fp} valutati</div>
                </div>
                <div style={{padding:"12px 14px",borderRadius:8,background:"var(--card)",border:"1px solid var(--brd)"}}>
                  <div style={{fontSize:12,color:"var(--dim3)",marginBottom:4}}>ACCURATEZZA CRITICI</div>
                  <div style={{fontSize:24,fontWeight:700,color:critAcc!=="-"&&parseInt(critAcc)>50?"var(--grn)":"var(--txt)"}}>{critAcc}%</div>
                  <div style={{fontSize:12,color:"var(--dim)"}}>{critTP} veri / {critTP+critFP} valutati</div>
                </div>
              </div>

              {/* Per-signal breakdown */}
              {Object.keys(sigStats).length>0&&<div style={{marginBottom:14,padding:12,borderRadius:8,background:"var(--card)",border:"1px solid var(--brd)"}}>
                <div style={{fontSize:13,color:"var(--blu)",fontWeight:700,marginBottom:8}}>ACCURATEZZA PER SEGNALE</div>
                {Object.entries(sigStats).sort((a,b)=>b[1].total-a[1].total).map(([k,v])=>{
                  const acc=v.tp+v.fp>0?((v.tp/(v.tp+v.fp))*100).toFixed(0):"-";
                  return <div key={k} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"6px 0",borderBottom:"1px solid #14141e",fontSize:13}}>
                    <span style={{color:"var(--txt2)"}}>{v.label||k}</span>
                    <div style={{display:"flex",gap:10,alignItems:"center",fontFamily:"var(--m)",fontSize:12}}>
                      <span style={{color:"var(--grn)"}}>{v.tp}✅</span>
                      <span style={{color:"var(--red)"}}>{v.fp}❌</span>
                      <span style={{color:"var(--dim)"}}>{v.pending}⏳</span>
                      <span style={{color:acc!=="-"&&parseInt(acc)>50?"var(--grn)":"var(--org)",fontWeight:700,minWidth:40,textAlign:"right"}}>{acc}%</span>
                    </div>
                  </div>
                })}
              </div>}
            </div>
          })()}

          {/* Archived signals list */}
          <div style={{fontSize:14,color:"var(--dim3)",fontWeight:700,marginBottom:8}}>SEGNALI ARCHIVIATI</div>
          {archive.length===0?<div style={{fontSize:14,color:"var(--dim)",textAlign:"center",padding:20}}>Nessun segnale archiviato. Esegui una scansione per iniziare.</div>:
          <div style={{maxHeight:400,overflowY:"auto",borderRadius:8,border:"1px solid var(--brd)"}}>
            {[...archive].reverse().map(a=>{
              const sevColor=a.severity==="critical"?"var(--red)":a.severity==="alert"?"var(--org)":"var(--blu)";
              const outIcon=a.outcome==="tp"?"✅":a.outcome==="fp"?"❌":"⏳";
              const outBg=a.outcome==="tp"?"#34c75908":a.outcome==="fp"?"#ff2d5508":"transparent";
              return <div key={a.id} style={{padding:"12px 14px",borderBottom:"1px solid #14141e",background:outBg}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:6}}>
                  <div style={{flex:1}}>
                    <div style={{fontSize:14,fontWeight:600,color:"var(--txt)",lineHeight:1.4}}>{a.question}</div>
                    <div style={{fontSize:12,color:"var(--dim3)",fontFamily:"var(--m)",marginTop:3}}>
                      <span style={{color:sevColor,fontWeight:700}}>{a.severity.toUpperCase()}</span> · Score {a.score} · {a.confidence} · {fmt(a.vol24h)} vol · {pct(a.yesPrice)} YES
                    </div>
                    <div style={{fontSize:11,color:"var(--dim)",marginTop:2}}>
                      {new Date(a.scanTime).toLocaleString("it-IT",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"})}
                      {a.signals&&<span> · {a.signals.map(s=>s.signal.split("_")[0]).join(", ")}</span>}
                    </div>
                  </div>
                  <div style={{fontSize:18,marginLeft:8}}>{outIcon}</div>
                </div>
                {a.outcomeNote&&<div style={{fontSize:12,color:"var(--dim3)",fontStyle:"italic",marginBottom:6}}>"{a.outcomeNote}"</div>}
                {/* Outcome buttons */}
                <div style={{display:"flex",gap:6,marginTop:6}}>
                  <button onClick={()=>setOutcome(a.id,"tp","")} style={{padding:"8px 14px",borderRadius:8,fontSize:13,fontWeight:600,border:`1px solid ${a.outcome==="tp"?"#34c75960":"var(--brd2)"}`,background:a.outcome==="tp"?"#34c75920":"var(--card)",color:a.outcome==="tp"?"var(--grn)":"var(--dim3)",minHeight:40}}>✅ Vero</button>
                  <button onClick={()=>setOutcome(a.id,"fp","")} style={{padding:"8px 14px",borderRadius:8,fontSize:13,fontWeight:600,border:`1px solid ${a.outcome==="fp"?"#ff2d5560":"var(--brd2)"}`,background:a.outcome==="fp"?"#ff2d5520":"var(--card)",color:a.outcome==="fp"?"var(--red)":"var(--dim3)",minHeight:40}}>❌ Falso</button>
                  <button onClick={()=>{const n=prompt("Nota (opzionale):");if(n!==null)setOutcome(a.id,a.outcome||"tp",n)}} style={{padding:"8px 14px",borderRadius:8,fontSize:13,fontWeight:600,border:"1px solid var(--brd2)",background:"var(--card)",color:"var(--dim3)",minHeight:40}}>📝 Nota</button>
                  <a href={`https://polymarket.com/event/${a.slug}`} target="_blank" rel="noopener" style={{padding:"8px 14px",borderRadius:8,fontSize:13,fontWeight:600,border:"1px solid var(--brd2)",background:"var(--card)",color:"var(--blu)",textDecoration:"none",display:"flex",alignItems:"center",minHeight:40}}>↗</a>
                </div>
              </div>
            })}
          </div>}

          {/* Clear button */}
          {archive.length>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:12}}>
            <span style={{fontSize:12,color:"var(--dim)"}}>{archive.length} segnali archiviati</span>
            <button onClick={()=>{if(confirm("Cancellare tutto l'archivio?")){setArchive([]);saveArchiveLocal([]);if(gistId&&gistToken)writeGist(gistId,gistToken,[])}}} style={{padding:"8px 14px",borderRadius:8,border:"1px solid #ff2d5540",background:"transparent",color:"var(--red)",fontSize:13,fontWeight:600}}>🗑 Svuota</button>
          </div>}

          {/* Scan history */}
          <div style={{marginTop:16,fontSize:14,color:"var(--dim3)",fontWeight:700,marginBottom:8}}>STORICO SCANSIONI</div>
          {hist.length===0?<div style={{fontSize:13,color:"var(--dim)",textAlign:"center",padding:12}}>Nessuna scansione</div>:
          <div style={{maxHeight:150,overflowY:"auto"}}>{[...hist].reverse().map((s,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid #14141e",fontSize:13,fontFamily:"var(--m)"}}><span style={{color:"var(--txt2)"}}>{ts(s.t)} {ds(s.t)}</span><span style={{padding:"2px 8px",borderRadius:4,fontSize:13,fontWeight:600,background:s.auto?"#34c75918":"#64d2ff18",color:s.auto?"var(--grn)":"var(--blu)"}}>{s.auto?"AUTO":"MAN"}</span><span style={{color:s.critical>0?"var(--red)":"var(--dim)"}}>{s.signals}sig {s.critical}crit</span></div>)}</div>}
        </div>}
      </header>

      {/* INSTALL BANNER — shown when app not installed */}
      {showInstall&&!isStandalone&&<div style={{margin:"8px 20px",padding:"14px 16px",borderRadius:10,background:"linear-gradient(135deg,#bf5af215,#8b5cf615)",border:"1px solid #bf5af240",display:"flex",alignItems:"center",gap:12}}>
        <div style={{flex:1}}>
          <div style={{fontSize:15,fontWeight:700,color:"#bf5af2",marginBottom:4}}>📲 Installa PM Scanner</div>
          <div style={{fontSize:13,color:"var(--txt2)",lineHeight:1.4}}>Aggiungilo alla home per accesso rapido e notifiche push.</div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
          {installPrompt?<button onClick={doInstall} style={{padding:"10px 16px",borderRadius:8,background:"linear-gradient(135deg,#bf5af2,#8b5cf6)",color:"#fff",fontSize:13,fontWeight:700,minHeight:40}}>Installa</button>
          :<button onClick={()=>{setPanel("settings");setSTab("install")}} style={{padding:"10px 16px",borderRadius:8,background:"#bf5af220",color:"#bf5af2",fontSize:13,fontWeight:700,border:"1px solid #bf5af240",minHeight:40}}>Come fare</button>}
          <button onClick={dismissInstall} style={{padding:"4px",background:"transparent",color:"var(--dim3)",fontSize:12,border:"none",minHeight:20}}>Chiudi</button>
        </div>
      </div>}

      {/* PROGRESS BAR */}
      {loading&&<div style={{padding:"0 20px"}}><div style={{height:3,background:"#1a1a28",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",width:`${progress.p}%`,background:"linear-gradient(90deg,#ff2d55,#ff6b6b)",transition:"width .3s"}}/></div></div>}
      {error&&<div style={{margin:"8px 20px",padding:"12px 16px",borderRadius:8,background:"#ff2d5515",border:"1px solid #ff2d5540",fontSize:14,color:"#ff6b6b"}}>⚠ {error}</div>}

      {/* STATS */}
      {stats&&<div style={{padding:"10px 20px",borderBottom:"1px solid var(--brd)",display:"flex",gap:16,fontSize:13,overflowX:"auto"}}>
        {[["Scan",stats.scanned,"var(--dim3)"],["Segnali",stats.signals,"var(--txt)"],["Crit",stats.critical,"var(--red)"],["Alert",stats.alert,"var(--org)"],["Mon",stats.watch,"var(--blu)"],["Ora",ts(lastScan),"var(--dim)"]].map(([k,v,c],i)=><div key={i} style={{display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>{k&&<span style={{color:"var(--dim2)",textTransform:"uppercase",letterSpacing:".4px",fontSize:14,fontWeight:600}}>{k}</span>}<span style={{color:c,fontWeight:700,fontFamily:"var(--m)",fontSize:14}}>{v}</span></div>)}
      </div>}

      {/* FILTERS */}
      {signals.length>0&&<div style={{padding:"12px 20px",borderBottom:"1px solid var(--brd)"}}>
        {/* Row 1: Severity */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,color:"var(--dim2)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Severità</div>
          <div style={{display:"flex",gap:6,overflowX:"auto"}}>
            {[["all","Tutti","Tutti i livelli"],["critical","🔴 Critici","Score alto, insider probabile"],["alert","🟠 Allerta","Anomalia da verificare"],["watch","🔵 Monitor","Sotto osservazione"]].map(([v,l,sub])=><button key={v} onClick={()=>setFSev(v)} style={{padding:"6px 12px",borderRadius:8,fontSize:13,fontWeight:600,border:`1px solid ${fSev===v?"var(--blu)50":"var(--brd)"}`,background:fSev===v?"#64d2ff15":"transparent",color:fSev===v?"var(--blu)":"var(--dim3)",whiteSpace:"nowrap",flexShrink:0,textAlign:"left"}}><div>{l}</div><div style={{fontSize:10,fontWeight:400,color:fSev===v?"var(--blu)":"var(--dim2)",marginTop:1}}>{sub}</div></button>)}
          </div>
        </div>
        {/* Row 2: Signal type */}
        <div style={{marginBottom:8}}>
          <div style={{fontSize:11,color:"var(--dim2)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Tipo segnale</div>
          <div style={{display:"flex",gap:5,overflowX:"auto"}}>
            {[["all","Tutti",""],["NEW_TYPE","🆕 Nuovo","Categoria rara"],["VOLUME_SURGE","📊 Volume","Picco anomalo"],["PRICE_DISLOCATION","⚡ Prezzo","Swing rapido"],["LIQ_IMBALANCE","💧 Liquidità","Vol vs Liq"],["NICHE_HEAT","🔍 Nicchia","Mkt oscuro attivo"],["GEO_SENSITIVE","🌐 Geo","Geopolitico"],["INFORMED_FLOW","🎯 Flusso","Spread largo + vol"]].map(([v,l,sub])=>sigC[v]||v==="all"?<button key={v} onClick={()=>setFSig(v)} style={{padding:"6px 10px",borderRadius:8,fontSize:12,fontWeight:500,border:"none",background:fSig===v?"var(--brd2)":"transparent",color:fSig===v?"var(--txt2)":"var(--dim2)",whiteSpace:"nowrap",flexShrink:0,textAlign:"left"}}><div>{l}{sigC[v]?` (${sigC[v]})`:""}</div>{sub&&<div style={{fontSize:10,fontWeight:400,color:"var(--dim2)",marginTop:1}}>{sub}</div>}</button>:null)}
          </div>
        </div>
        {/* Row 3: Category */}
        <div>
          <div style={{fontSize:11,color:"var(--dim2)",fontWeight:600,textTransform:"uppercase",letterSpacing:".5px",marginBottom:6}}>Categoria mercato</div>
          <div style={{display:"flex",gap:5,overflowX:"auto"}}>
            <button onClick={()=>setFCat("all")} style={{padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:500,border:"none",background:fCat==="all"?"var(--brd2)":"transparent",color:fCat==="all"?"var(--txt2)":"var(--dim2)",whiteSpace:"nowrap",flexShrink:0}}>Tutte</button>
            {Object.entries(catC).sort((a,b)=>b[1]-a[1]).map(([cat,n])=><button key={cat} onClick={()=>setFCat(cat)} style={{padding:"6px 12px",borderRadius:8,fontSize:12,fontWeight:500,border:"none",background:fCat===cat?"var(--brd2)":"transparent",color:fCat===cat?"var(--txt2)":"var(--dim2)",whiteSpace:"nowrap",flexShrink:0}}>{cat} ({n})</button>)}
          </div>
        </div>
      </div>}

      {/* RESULTS */}
      <div style={{padding:"16px 20px 50px"}}>
        {!lastScan&&!loading&&<div style={{textAlign:"center",padding:"70px 20px"}}>
          <div style={{fontSize:40,marginBottom:16,opacity:.15}}>◉</div>
          <div style={{fontSize:18,fontWeight:600,color:"var(--dim3)",marginBottom:8}}>Pronto per l'analisi</div>
          <div style={{fontSize:14,color:"var(--dim)",lineHeight:1.7,maxWidth:400,margin:"0 auto"}}>Tocca <strong style={{color:"var(--red)"}}>▶ SCAN</strong> nella barra in basso per avviare la scansione dei mercati Polymarket.</div>
        </div>}
        {disp.length>0&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={{fontSize:14,color:"var(--dim)"}}>{disp.length} segnali trovati</span>
          <button onClick={()=>translateAll(disp)} style={{padding:"8px 16px",borderRadius:8,border:"1px solid #64d2ff30",background:"#64d2ff10",color:"var(--blu)",fontSize:13,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>🇮🇹 Traduci tutti</button>
        </div>}
        {disp.map((s,i)=><Card key={s.market.id||i} signal={s} rank={i+1} translation={translations[s.market.id]} onTranslate={translateText} isTranslating={translating===s.market.id}/>)}
        {lastScan&&disp.length===0&&<div style={{textAlign:"center",padding:30,color:"var(--dim)",fontSize:14}}>Nessun segnale con i filtri attuali.</div>}
      </div>

      {/* ═══ BOTTOM TAB BAR ═══ */}
      <div className="tab-bar">
        <button className={`tab-btn${panel===null&&!loading?" active":""}`} onClick={()=>setPanel(null)}>
          <span className="ti">🏠</span><span className="tl">Home</span>
        </button>
        <button className={`tab-btn scan-btn`} onClick={loading?()=>abRef.current?.abort():()=>scan(false)}>
          <span className="ti">{loading?"■":"▶"}</span><span className="tl">{loading?"STOP":"SCAN"}</span>
        </button>
        <button className={`tab-btn${panel==="history"?" active":""}`} onClick={()=>toggle("history")}>
          <span className="ti">📊</span><span className="tl">Storico</span>
        </button>
        <button className={`tab-btn${panel==="settings"?" active":""}`} onClick={()=>toggle("settings")} style={schOn||Object.values(ch).some(v=>v)?{color:"var(--grn)"}:{}}>
          <span className="ti">⚙</span><span className="tl">Impostazioni</span>
        </button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

<script>
// Register Service Worker
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('./sw.js').then(r=>{
      console.log('SW registered',r.scope);
    }).catch(e=>console.log('SW failed',e));
  });
}

// PWA Install — floating banner for first-time visitors
let deferredPrompt;
const _isStandalone=window.matchMedia('(display-mode:standalone)').matches||window.navigator.standalone===true;
const _isIOS=(navigator.userAgent||"").indexOf("iPhone")>=0||(navigator.userAgent||"").indexOf("iPad")>=0||(navigator.userAgent||"").indexOf("iPod")>=0;

window.addEventListener('beforeinstallprompt',(e)=>{
  e.preventDefault();
  deferredPrompt=e;
  if(!_isStandalone&&!localStorage.getItem('pm_install_dismissed')){
    setTimeout(showInstallBanner,4000);
  }
});

if(_isIOS&&!_isStandalone&&!localStorage.getItem('pm_install_dismissed')){
  setTimeout(()=>{
    const b=document.createElement('div');b.id='install-banner';
    b.innerHTML=`<div style="position:fixed;bottom:16px;left:16px;right:16px;padding:14px 16px;background:#1a1a28;border:1px solid #252535;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:1000;font-family:var(--s);animation:fadeIn .3s ease">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:13px;color:#e5e5ee;font-weight:700">📲 Installa PM Scanner</div>
        <button onclick="dismissInstall()" style="background:none;border:none;color:#505068;font-size:16px;cursor:pointer;padding:4px">✕</button>
      </div>
      <div style="font-size:11px;color:#b0b0c0;line-height:1.6">
        Tocca <strong style="color:#64d2ff">⬆ Condividi</strong> poi <strong style="color:#64d2ff">"Aggiungi a schermata Home"</strong>
      </div>
    </div>`;
    document.body.appendChild(b);
  },4000);
}

function showInstallBanner(){
  if(!deferredPrompt||document.getElementById('install-banner'))return;
  const b=document.createElement('div');b.id='install-banner';
  b.innerHTML=`<div style="position:fixed;bottom:16px;left:16px;right:16px;padding:14px 16px;background:#1a1a28;border:1px solid #252535;border-radius:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);z-index:1000;font-family:var(--s);animation:fadeIn .3s ease">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div style="font-size:13px;color:#e5e5ee;font-weight:700">📲 Installa PM Scanner</div>
        <div style="font-size:10px;color:#707088;margin-top:2px">App nativa con notifiche e accesso rapido</div>
      </div>
      <div style="display:flex;gap:8px">
        <button onclick="dismissInstall()" style="padding:8px 12px;border-radius:6px;border:1px solid #252535;background:transparent;color:#707088;font-size:11px;cursor:pointer;font-family:var(--s)">Dopo</button>
        <button onclick="installPWA()" style="padding:8px 16px;border-radius:6px;border:none;background:linear-gradient(135deg,#bf5af2,#8b5cf6);color:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:var(--s)">Installa</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(b);
}

function installPWA(){
  const b=document.getElementById('install-banner');
  if(b)b.remove();
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null})}
}
function dismissInstall(){
  const b=document.getElementById('install-banner');
  if(b)b.remove();
  localStorage.setItem('pm_install_dismissed','1');
}
</script>
</body>
</html>
